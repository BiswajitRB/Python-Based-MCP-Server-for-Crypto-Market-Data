name: docker-build-push           #actual CI PART, which is build and push the docker image to docker hub
on:
    workflow_dispatch:
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: login to docker hub
              uses: docker/login-action@v4
              with: 
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: build and push to  docker
              uses: docker/build-push-action@v4
              with:
                  context: .      #the context is the location of the docker file, which is in the root directory of the repository, so we use . to specify the current directory as the context
                  push: true
                  tags: |
                      ${{ vars.DOCKERHUB_USER }}/github-actions-app:latest
                      ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{github.sha}}
                      ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.ref_name }}
