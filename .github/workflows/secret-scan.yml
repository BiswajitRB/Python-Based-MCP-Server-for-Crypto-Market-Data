name: secrets-scan

on:
    workflow_call:

jobs:
    secret-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:                              #its use for 0 defth codescan, which means its scan all entire code lines 
                fetch-depth: 0

            - name: run GitLekas scaner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}} #does not require to add this token in secrets because its automatically generated by github and it has permission to access the repository